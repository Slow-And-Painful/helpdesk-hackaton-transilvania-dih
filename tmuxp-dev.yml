session_name: hackaton-tdih
windows:
  - window_name: hackaton-tdih
    layout: tiled
    panes:
      # Docker Compose
      - shell_command: |
          docker compose up

      # Drizzle kit studio
      - shell_command: |
          nvm use
          ./node_modules/drizzle-kit/bin.cjs studio

      # Monolith
      - shell_command: |
          nvm use
          npm run assets:types
          npm run server:dev

      # Local lambda environment
      - shell_command: |
          npm run lambda:dev
